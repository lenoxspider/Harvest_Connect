# Storage Service
server.port=${SERVER_PORT:8084}
spring.application.name=storage-service

# PostgreSQL - uses environment variables
spring.datasource.url=${DB_URL_STORAGE:jdbc:postgresql://localhost:5432/storage_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Auth service URL (for token validation)
auth.service.url=${AUTH_SERVICE_URL:http://localhost:8081}
