databases:
  - name: harvestconnect-db
    plan: free
    databaseName: harvestconnect
    user: hc_admin
    region: frankfurt

services:
  # ── Auth Service ──
  - type: web
    name: harvestconnect-auth-service
    runtime: docker
    region: frankfurt
    plan: free
    rootDir: ./auth-service
    envVars:
      - key: SERVER_PORT
        value: "8081"
      - key: PORT
        value: "8081"
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

  # ── Produce Service ──
  - type: web
    name: harvestconnect-produce-service
    runtime: docker
    region: frankfurt
    plan: free
    rootDir: ./produce-service
    envVars:
      - key: PORT
        value: "8082"
      - key: DB_URL_PRODUCE
        sync: false
      - key: DB_USERNAME_PRODUCE
        sync: false
      - key: DB_PASSWORD_PRODUCE
        sync: false

  # ── Transport Service ──
  - type: web
    name: harvestconnect-transport-service
    runtime: docker
    region: frankfurt
    plan: free
    rootDir: ./transport-service
    envVars:
      - key: SERVER_PORT
        value: "8083"
      - key: PORT
        value: "8083"
      - key: DB_URL_TRANSPORT
        sync: false
      - key: DB_USERNAME_TRANSPORT
        sync: false
      - key: DB_PASSWORD_TRANSPORT
        sync: false

  # ── Storage Service ──
  - type: web
    name: harvestconnect-storage-service
    runtime: docker
    region: frankfurt
    plan: free
    rootDir: ./storage-service
    envVars:
      - key: SERVER_PORT
        value: "8084"
      - key: PORT
        value: "8084"
      - key: DB_URL_STORAGE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

  # ── Payment Service ──
  - type: web
    name: harvestconnect-payment-service
    runtime: docker
    region: frankfurt
    plan: free
    rootDir: ./payment-service
    envVars:
      - key: SERVER_PORT
        value: "8085"
      - key: PORT
        value: "8085"
      - key: DB_URL_PAYMENT
        sync: false
      - key: DB_USERNAME_PAYMENT
        sync: false
      - key: DB_PASSWORD_PAYMENT
        sync: false

  # ── Notification Service ──
  - type: web
    name: harvestconnect-notification-service
    runtime: docker
    region: frankfurt
    plan: free
    rootDir: ./notification-service
    envVars:
      - key: SERVER_PORT
        value: "8086"
      - key: PORT
        value: "8086"
      - key: DB_URL_NOTIFICATION
        sync: false
      - key: DB_USERNAME_NOTIFICATION
        sync: false
      - key: DB_PASSWORD_NOTIFICATION
        sync: false

  # ── KYC Service ──
  - type: web
    name: harvestconnect-kyc-service
    runtime: docker
    region: frankfurt
    plan: free
    rootDir: ./kyc-service
    envVars:
      - key: SERVER_PORT
        value: "8087"
      - key: PORT
        value: "8087"
      - key: DB_URL_KYC
        sync: false
      - key: DB_USERNAME_KYC
        sync: false
      - key: DB_PASSWORD_KYC
        sync: false

  # ── API Gateway ──
  - type: web
    name: harvestconnect-api-gateway
    runtime: docker
    region: frankfurt
    plan: free
    rootDir: ./api-gateway
    envVars:
      - key: AUTH_SERVICE_URL
        value: "https://harvestconnect-auth-service.onrender.com"
      - key: PRODUCE_SERVICE_URL
        value: "https://harvestconnect-produce-service.onrender.com"
      - key: TRANSPORT_SERVICE_URL
        value: "https://harvestconnect-transport-service.onrender.com"
      - key: STORAGE_SERVICE_URL
        value: "https://harvestconnect-storage-service.onrender.com"
      - key: PAYMENT_SERVICE_URL
        value: "https://harvestconnect-payment-service.onrender.com"
      - key: NOTIFICATION_SERVICE_URL
        value: "https://harvestconnect-notification-service.onrender.com"
      - key: KYC_SERVICE_URL
        value: "https://harvestconnect-kyc-service.onrender.com"
