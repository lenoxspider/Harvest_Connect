spring.application.name=produce-service

spring.datasource.url=${DB_URL_PRODUCE:jdbc:postgresql://localhost:5432/produce_db}
spring.datasource.username=${DB_USERNAME_PRODUCE:postgres}
spring.datasource.password=${DB_PASSWORD_PRODUCE:password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8082
