server:
  port: 8080

spring:
  application:
    name: harvestconnect-api-gateway
  cloud:
    gateway:
      # Enable CORS for all origins and methods
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
      
      # Define routing rules
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        - id: produce-service
          uri: ${PRODUCE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/produce/**

        - id: transport-service
          uri: ${TRANSPORT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/transport/**

        - id: storage-service
          uri: ${STORAGE_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/storage/**

        - id: payments-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/payments/**

        - id: notifications-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/notifications/**

        - id: kyc-service
          uri: ${KYC_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/kyc/**
