server:
  port: 8080

spring:
  application:
    name: harvestconnect-api-gateway
  cloud:
    gateway:
      # Enable CORS for all origins and methods
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
      
      # Define routing rules
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: produce-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/produce/**

        - id: transport-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/transport/**

        - id: storage-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/storage/**

        - id: payments-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/payments/**

        - id: notifications-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/notifications/**